<body>
    <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Ball Pool</title>
    <style>
        /* Asosiy uslublar */
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Telefon konteyneri - animatsiya uchun */
        .phone-container {
            width: 320px; /* Sizning telefoningiz kengligi */
            height: 640px; /* Sizning telefoningiz balandligi */
            background: rgba(0, 0, 0, 0.8); /* Dastlab qora fon */
            border-radius: 36px;
            overflow: hidden;
            position: relative;
            transform: rotate(0deg); /* Dastlab vertikal */
            transition: all 1s ease-in-out; /* Animatsiya vaqti */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Telefon aylangandagi holati */
        .phone-container.rotate-game {
            transform: rotate(-90deg) scale(1.1); /* 90 gradusga aylanadi */
            width: 640px; /* Kengayadi */
            height: 320px;
            background: #fff; /* Oq fonga o'zgaradi */
        }

        /* O'yin maydoni */
        #game-area {
            display: none; /* Dastlab yashirin */
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* Elementlarga teginishni yoqish kerak */
        }

        /* O'yin elementlari ko'rinishi */
        .phone-container.rotate-game #game-area {
            display: block;
            pointer-events: auto;
        }

        /* Bilyard stoli (rasm yoki div) */
        #billiard-table {
            width: 80%;
            height: 80%;
            background-color: #2d572c; /* Yashil rang */
            border: 15px solid #5d3a1a;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
        }

        /* Oq shar */
        #cue-ball {
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 20%;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* Tayoqcha (Cue Stick) */
        #cue-stick {
            width: 250px;
            height: 8px;
            background-color: #d2b48c; /* Yog'och rang */
            border: 2px solid #8b4513;
            position: absolute;
            top: 50%;
            left: 10%; /* Shar orqasida */
            transform-origin: left center; /* Oq shar atrofida aylanish nuqtasi */
            transform: translateY(-50%) rotate(180deg);
            border-radius: 4px;
            display: none; /* Dastlab yashirin */
        }

        /* Joystik va Udar tugmasi */
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Joystik (O'nga-Chapga) */
        .joystick {
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #555;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
        }
        .joystick .knob {
            width: 26px;
            height: 26px;
            background: #555;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 15px; /* Markaz */
            transition: left 0.1s;
        }
</body>
</html>
