<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swipe Up Panel</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f2f2f2;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h2 {
      position: absolute;
      top: 40%;
      text-align: center;
      width: 100%;
      color: #555;
    }

    .bottom-panel {
      position: fixed;
      left: 0;
      bottom: -70%;
      width: 100%;
      height: 70%;
      background: #fff;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
      transition: bottom 0.3s ease;
    }

    .bottom-panel.active {
      bottom: 0;
    }

    .handle {
      width: 60px;
      height: 6px;
      background: #ccc;
      border-radius: 3px;
      margin: 10px auto;
    }

    .content {
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Pastdan tepaga suring yoki sichqoncha bilan torting 👇</h2>

  <div class="bottom-panel" id="panel">
    <div class="handle"></div>
    <div class="content">
      <h3>Ilova paneli</h3>
      <p>Bu joyda menyular, sozlamalar yoki boshqa narsalar bo‘lishi mumkin.</p>
    </div>
  </div>

  <script>
    const panel = document.getElementById("panel");
    let startY = 0;
    let endY = 0;
    let isMouseDown = false;

    // Touch (mobil)
    document.addEventListener("touchstart", e => {
      startY = e.touches[0].clientY;
    });

    document.addEventListener("touchend", e => {
      endY = e.changedTouches[0].clientY;
      checkSwipe();
    });

    // Mouse (kompyuter)
    document.addEventListener("mousedown", e => {
      isMouseDown = true;
      startY = e.clientY;
    });

    document.addEventListener("mouseup", e => {
      if (isMouseDown) {
        endY = e.clientY;
        isMouseDown = false;
        checkSwipe();
      }
    });

    function checkSwipe() {
      if (startY - endY > 80) {
        panel.classList.add("active"); // tepaga tortilsa ochiladi
      } else if (endY - startY > 80) {
        panel.classList.remove("active"); // pastga tortilsa yopiladi
      }
    }
  </script>
</body>
</html>
